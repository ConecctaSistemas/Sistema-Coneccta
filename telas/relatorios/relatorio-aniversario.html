<!DOCTYPE html>
<html lang="pt-BR">
<head>
<base href="../../">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatório de Aniversário de Clientes</title>

<link rel="stylesheet" href="telas/relatorios/css/relatorio-aniversario.css">
<link rel="stylesheet" href="telas/relatorios/css/relatorio-visualizador.css">

<link rel="stylesheet" href="vendor/fontawesome/css/all.min.css">

<link rel="stylesheet" href="shared/css/design-base.css">
</head>
<body>


<div class="container">

    <div class="topo">
        <div class="topo-com-acoes">
            <div>
                <h1>Aniversário de Clientes</h1>
                <p>Clientes que fazem aniversário no mês selecionado, para ações de relacionamento.</p>
            </div>
            <a class="btn-voltar" href="telas/relatorios/relatorios.html">
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </a>
        </div>
    </div>

    <div class="painel-filtros">
        <form id="formRelatorioAniversario">
            <div class="grid-filtros">
                <label>
                    Mês de aniversário
                    <select id="mesAniversario">
                        <option value="">Mês atual</option>
                        <option value="1">Janeiro</option>
                        <option value="2">Fevereiro</option>
                        <option value="3">Março</option>
                        <option value="4">Abril</option>
                        <option value="5">Maio</option>
                        <option value="6">Junho</option>
                        <option value="7">Julho</option>
                        <option value="8">Agosto</option>
                        <option value="9">Setembro</option>
                        <option value="10">Outubro</option>
                        <option value="11">Novembro</option>
                        <option value="12">Dezembro</option>
                    </select>
                </label>
            </div>

            <div class="secao-tipos-info">
                <h3>Informações incluídas</h3>
                <div class="checks-tipos-info">
                    <label class="check-tipo-info">
                        <input type="checkbox" id="somenteAtivosAniversario" name="somenteAtivos" checked>
                        <span>Somente clientes ativos</span>
                    </label>
                </div>
            </div>

            <div class="acoes-filtro">
                <button type="submit" class="btn-gerar" id="btnGerarRelatorio">
                    <i class="fa-solid fa-file-circle-check"></i>
                    Gerar relatório
                </button>
            </div>
        </form>
    </div>

</div>


<script src="shared/js/util.js?v=20260701-fecha-fora"></script>
<script src="shared/js/notification-manager.js?v=20260702-global"></script>
<script src="shared/js/seguranca.js"></script>
<script src="shared/js/erpApi.js"></script>
<script src="shared/js/api-config.js"></script>
<script src="shared/js/empresa.js"></script>
<script src="shared/js/auth.js?v=20260701-sino-fecha-fora"></script>
<script src="telas/relatorios/js/relatorio-visualizador.js"></script>
<script src="telas/relatorios/js/relatorio-aniversario.js"></script>

</body>
</html>
