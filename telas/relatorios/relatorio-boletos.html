<!DOCTYPE html>
<html lang="pt-BR">
<head>
<base href="../../">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatório de Boletos Bancários</title>

<link rel="stylesheet" href="telas/relatorios/css/relatorio-boletos.css">
<link rel="stylesheet" href="telas/relatorios/css/relatorio-visualizador.css">

<link rel="stylesheet" href="vendor/fontawesome/css/all.min.css">

<link rel="stylesheet" href="shared/css/design-base.css">
</head>
<body>


<div class="container">

    <div class="topo">
        <div class="topo-com-acoes">
            <div>
                <h1>Boletos Bancários</h1>
                <p>Boletos emitidos no período, com vencimento, valor e status de pagamento.</p>
            </div>
            <a class="btn-voltar" href="telas/relatorios/relatorios.html">
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </a>
        </div>
    </div>

    <div class="painel-filtros">
        <form id="formRelatorioBoletos">
            <div class="grid-filtros">
                <label>
                    Vencimento inicial
                    <input type="date" id="dataInicioBoletos" name="dataInicio">
                </label>
                <label>
                    Vencimento final
                    <input type="date" id="dataFimBoletos" name="dataFim">
                </label>
                <label>
                    Status
                    <select id="statusBoletos">
                        <option value="">Todos</option>
                        <option value="aberto">Em aberto</option>
                        <option value="pago">Pago</option>
                        <option value="vencido">Vencido</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                </label>
            </div>

            <div class="acoes-filtro">
                <button type="submit" class="btn-gerar" id="btnGerarRelatorio">
                    <i class="fa-solid fa-file-circle-check"></i>
                    Gerar relatório
                </button>
            </div>
        </form>
    </div>

</div>


<script src="shared/js/util.js?v=20260701-fecha-fora"></script>
<script src="shared/js/notification-manager.js?v=20260702-global"></script>
<script src="shared/js/seguranca.js"></script>
<script src="shared/js/erpApi.js"></script>
<script src="shared/js/api-config.js"></script>
<script src="shared/js/empresa.js"></script>
<script src="shared/js/auth.js?v=20260701-sino-fecha-fora"></script>
<script src="telas/relatorios/js/relatorio-visualizador.js"></script>
<script src="telas/relatorios/js/relatorio-boletos.js"></script>

</body>
</html>
